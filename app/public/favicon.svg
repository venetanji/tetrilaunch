<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="1" stop-color="#7a5cff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#07070f"/>
  <g filter="url(#glow)" fill="none" stroke="url(#g)" stroke-width="3" stroke-linejoin="round">
    <!-- cannon -->
    <rect x="10" y="34" width="12" height="12" rx="2"/>
    <!-- parabola -->
    <path d="M22 38 Q38 8 54 40" stroke="#00ff85" stroke-dasharray="2 4" stroke-width="2"/>
    <!-- launched piece -->
    <rect x="46" y="34" width="8" height="8" rx="1.5" stroke="#ffe500"/>
  </g>
</svg>
